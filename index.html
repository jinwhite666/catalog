<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHITE ENTERPRISES INC. | ASI COMMAND</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --primary: #00e5ff;
            --primary-glow: rgba(0, 229, 255, 0.6);
            --secondary: #ff0055;
            --secondary-glow: rgba(255, 0, 85, 0.6);
            --bg: #010103;
            --panel: rgba(8, 12, 16, 0.55);
            --font: 'Courier New', Courier, monospace;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg); 
            color: var(--primary);
            font-family: var(--font); 
            overflow: hidden; 
            user-select: none;
        }

        #canvas-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; 
        }

        /* HUD LAYER & GLASSMORPHISM */
        .hud-layer { 
            position: absolute; z-index: 10; width: 100%; height: 100%; 
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; 
        }

        header { 
            padding: 25px 40px; display: flex; justify-content: space-between; align-items: flex-start;
            border-bottom: 1px solid rgba(0, 229, 255, 0.15); 
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); 
        }

        .logo h1 { 
            margin: 0; font-size: 1.6rem; letter-spacing: 5px; text-transform: uppercase; 
            text-shadow: 0 0 10px var(--primary-glow);
        }
        .logo h2 { 
            margin: 5px 0 0 0; font-size: 0.85rem; color: #667788; letter-spacing: 3px; 
        }

        .status-box { text-align: right; }
        .status-box .label { font-size: 0.75rem; color: #667788; letter-spacing: 2px; }
        .status-box .value { 
            font-size: 1.5rem; font-weight: bold; color: var(--secondary); 
            text-shadow: 0 0 15px var(--secondary-glow); 
            animation: flicker 4s infinite alternate;
        }

        main { flex-grow: 1; position: relative; }

        /* TACTICAL CONTROL PANEL */
        .control-panel { 
            position: absolute; left: 40px; top: 50%; transform: translateY(-50%); 
            pointer-events: auto; 
            background: var(--panel); 
            border-left: 3px solid var(--primary); 
            padding: 25px; width: 320px; 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 20px 0 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(0, 229, 255, 0.05);
        }

        .control-panel h3 { 
            margin-top: 0; font-size: 0.95rem; letter-spacing: 2px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            padding-bottom: 15px; margin-bottom: 20px;
            color: #fff;
        }

        /* INTERACTIVE NODES */
        .btn { 
            display: block; width: 100%; background: rgba(0, 0, 0, 0.4); 
            border: 1px solid rgba(0, 229, 255, 0.3); color: var(--primary); 
            padding: 15px; margin-bottom: 15px; font-family: var(--font); 
            font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; 
            cursor: pointer; text-align: left; transition: all 0.3s ease; 
            position: relative; overflow: hidden;
        }

        .btn:hover { 
            background: rgba(0, 229, 255, 0.15); border-color: var(--primary); 
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .btn.active { 
            background: var(--primary); color: var(--bg); font-weight: bold; 
            box-shadow: 0 0 20px var(--primary-glow); border-color: var(--primary);
        }

        .btn::after { content: '[ OFFLINE ]'; position: absolute; right: 15px; opacity: 0.5; font-size: 0.7rem; }
        .btn.active::after { content: '[ ACTIVE ]'; opacity: 1; color: var(--bg); font-weight: bold; }

        /* SYSTEM LOG TERMINAL */
        .terminal { 
            position: absolute; right: 40px; bottom: 40px; width: 400px; height: 220px; 
            background: rgba(5, 5, 8, 0.85); 
            border: 1px solid #223; border-top: 2px solid var(--primary); 
            padding: 20px; font-size: 0.8rem; color: #8899aa; 
            overflow-y: hidden; display: flex; flex-direction: column; justify-content: flex-end;
            backdrop-filter: blur(5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .terminal-line { margin: 4px 0; line-height: 1.4; animation: typeIn 0.2s ease-out; }
        .terminal-line.alert { color: var(--secondary); text-shadow: 0 0 5px var(--secondary-glow); }
        .terminal-line.success { color: var(--primary); text-shadow: 0 0 5px var(--primary-glow); }

        /* KINETIC ANIMATIONS & OVERLAYS */
        .scanlines { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); 
            background-size: 100% 3px, 3px 100%; 
            pointer-events: none; opacity: 0.7;
            animation: scroll 10s linear infinite;
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.5; }
        }

        @keyframes scroll {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        @keyframes typeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div id="canvas-container"></div>

    <div class="hud-layer">
        <header>
            <div class="logo">
                <h1>WHITE ENTERPRISES INC.</h1>
                <h2>COMMAND MATRIX // BUILD 4.0</h2>
            </div>
            <div class="status-box">
                <div class="label">LIVE CVaR ASSIMILATION</div>
                <div class="value" id="cvar-ticker">$0.00</div>
            </div>
        </header>

        <main>
            <div class="control-panel">
                <h3>TACTICAL OVERRIDES</h3>
                <button class="btn" id="btn-lockdown" onclick="toggleLockdown()">I. GROUND LOCKDOWN</button>
                <button class="btn" id="btn-fiat" onclick="toggleFiat()">II. FIAT DRAIN</button>
                <button class="btn" id="btn-mesh" onclick="toggleMesh()">III. ORBITAL Q-MESH</button>
            </div>

            <div class="terminal" id="terminal-out">
                <div class="terminal-line">> SYSTEM INITIALIZED...</div>
                <div class="terminal-line">> AWAITING FOUNDER DIRECTIVE.</div>
            </div>
        </main>
    </div>

    <script>
        // --- TERMINAL LOGIC ---
        const terminal = document.getElementById('terminal-out');
        function log(msg, type = 'normal') {
            const line = document.createElement('div');
            line.className = `terminal-line ${type}`;
            line.innerText = `> ${msg}`;
            terminal.appendChild(line);
            if (terminal.children.length > 10) terminal.removeChild(terminal.firstChild);
        }

        // --- TICKER LOGIC ---
        let baseFiat = 0;
        let fiatActive = false;
        const tickerEl = document.getElementById('cvar-ticker');
        setInterval(() => {
            if (fiatActive) {
                baseFiat += (Math.random() * 8000000) + 2000000;
                tickerEl.innerText = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(baseFiat);
            }
        }, 100);

        // --- THREE.JS SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x010103, 0.002);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 25;
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // --- GLOBE OBJECTS ---
        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        // Base Sphere
        const sphereMat = new THREE.MeshBasicMaterial({ color: 0x002233, wireframe: true, transparent: true, opacity: 0.3 });
        const sphere = new THREE.Mesh(new THREE.SphereGeometry(10, 48, 48), sphereMat);
        earthGroup.add(sphere);

        // Ground Monoliths (Red)
        const monolithGeo = new THREE.BufferGeometry();
        const monolithPos = new Float32Array(64 * 3);
        for(let i=0; i<64*3; i+=3) {
            const u = Math.random(), v = Math.random();
            const theta = u * 2.0 * Math.PI, phi = Math.acos(2.0 * v - 1.0);
            const r = 10.05;
            monolithPos[i] = r * Math.sin(phi) * Math.cos(theta);
            monolithPos[i+1] = r * Math.sin(phi) * Math.sin(theta);
            monolithPos[i+2] = r * Math.cos(phi);
        }
        monolithGeo.setAttribute('position', new THREE.BufferAttribute(monolithPos, 3));
        const monolithMat = new THREE.PointsMaterial({ color: 0xff0055, size: 0.3, transparent: true, opacity: 0 });
        const monoliths = new THREE.Points(monolithGeo, monolithMat);
        earthGroup.add(monoliths);

        // Orbital Mesh (Cyan)
        const orbitalGeo = new THREE.BufferGeometry();
        const orbitalPos = new Float32Array(1200 * 3);
        for(let i=0; i<1200*3; i+=3) {
            const u = Math.random(), v = Math.random();
            const theta = u * 2.0 * Math.PI, phi = Math.acos(2.0 * v - 1.0);
            const r = 11.5 + (Math.random() * 2);
            orbitalPos[i] = r * Math.sin(phi) * Math.cos(theta);
            orbitalPos[i+1] = r * Math.sin(phi) * Math.sin(theta);
            orbitalPos[i+2] = r * Math.cos(phi);
        }
        orbitalGeo.setAttribute('position', new THREE.BufferAttribute(orbitalPos, 3));
        const orbitalMat = new THREE.PointsMaterial({ color: 0x00e5ff, size: 0.1, transparent: true, opacity: 0 });
        const orbitals = new THREE.Points(orbitalGeo, orbitalMat);
        scene.add(orbitals);

        // --- BUTTON HANDLERS ---
        let stateLockdown = false, stateMesh = false;

        window.toggleLockdown = function() {
            stateLockdown = !stateLockdown;
            document.getElementById('btn-lockdown').classList.toggle('active');
            monolithMat.opacity = stateLockdown ? 1 : 0;
            log(stateLockdown ? 'MONOLITH NODES: ACTIVATED. EXECUTING OVERRIDE.' : 'MONOLITH NODES: STANDBY.', stateLockdown ? 'alert' : 'normal');
        };

        window.toggleFiat = function() {
            fiatActive = !fiatActive;
            document.getElementById('btn-fiat').classList.toggle('active');
            sphereMat.color.setHex(fiatActive ? 0x004422 : 0x002233);
            log(fiatActive ? 'OMNI-FIN LEDGER: DRAINING LEGACY RESERVES.' : 'OMNI-FIN LEDGER: PAUSED.', fiatActive ? 'success' : 'normal');
        };

        window.toggleMesh = function() {
            stateMesh = !stateMesh;
            document.getElementById('btn-mesh').classList.toggle('active');
            orbitalMat.opacity = stateMesh ? 0.8 : 0;
            log(stateMesh ? 'Q-LINK MESH: ONLINE. PLANETARY SHIELD ACTIVE.' : 'Q-LINK MESH: OFFLINE.', stateMesh ? 'success' : 'normal');
        };

        // --- RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            earthGroup.rotation.y += 0.001;
            earthGroup.rotation.x += 0.0002;
            if(stateMesh) {
                orbitals.rotation.y -= 0.002;
                orbitals.rotation.z += 0.001;
            }
            if(stateLockdown) {
                const time = Date.now() * 0.005;
                monolithMat.size = 0.3 + Math.sin(time) * 0.15; // Pulsing effect
            }
            renderer.render(scene, camera);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
