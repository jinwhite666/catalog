<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHITE ENTERPRISES INC. | GLOBAL OVERVIEW</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');

        :root {
            --bg-base: #030508;
            --neon-blue: #00f3ff;
            --neon-magenta: #ff00ea;
            --neon-yellow: #fffb00;
            --neon-green: #00ff66;
            --neon-red: #ff0055;
            --grid-color: rgba(0, 243, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: var(--bg-base);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        /* Moving Cyber Grid Background */
        #cyber-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        /* CRT Scanline Overlay */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: -1;
            pointer-events: none;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        /* Header Styling */
        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 2px solid var(--neon-blue);
            padding-bottom: 20px;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.1), transparent);
        }

        h1 {
            font-family: 'Share Tech Mono', monospace;
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            text-transform: uppercase;
        }

        .subtitle {
            font-family: 'Share Tech Mono', monospace;
            color: var(--neon-magenta);
            font-size: 1rem;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        /* Data Matrix Layout */
        .data-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Individual Data Cards */
        .data-card {
            background: rgba(10, 15, 25, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 4px solid var(--neon-blue);
            backdrop-filter: blur(5px);
            padding: 20px;
            display: grid;
            grid-template-columns: 50px 2fr 1fr 1fr;
            align-items: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .data-card:hover {
            background: rgba(20, 30, 45, 0.9);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            transform: translateX(10px);
        }

        .rank {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.8rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.3);
        }

        .site-info h2 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .sector-tag {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            padding: 3px 8px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
            display: inline-block;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .traffic-data {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            text-align: right;
            color: #fff;
        }

        /* Visual Volume Bar */
        .volume-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
            grid-column: 1 / -1; /* Spans across the whole bottom of the card */
        }

        .volume-bar {
            height: 100%;
            width: 0%; /* Set via JS */
            box-shadow: 0 0 10px currentColor;
            transition: width 1.5s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        /* Sector Colors */
        .color-search { color: var(--neon-blue); border-left-color: var(--neon-blue); }
        .color-search .volume-bar { background: var(--neon-blue); color: var(--neon-blue); }
        .color-search .sector-tag { border: 1px solid var(--neon-blue); color: var(--neon-blue); }

        .color-video { color: var(--neon-red); border-left-color: var(--neon-red); }
        .color-video .volume-bar { background: var(--neon-red); color: var(--neon-red); }
        .color-video .sector-tag { border: 1px solid var(--neon-red); color: var(--neon-red); }

        .color-social { color: var(--neon-magenta); border-left-color: var(--neon-magenta); }
        .color-social .volume-bar { background: var(--neon-magenta); color: var(--neon-magenta); }
        .color-social .sector-tag { border: 1px solid var(--neon-magenta); color: var(--neon-magenta); }

        .color-ai { color: var(--neon-green); border-left-color: var(--neon-green); }
        .color-ai .volume-bar { background: var(--neon-green); color: var(--neon-green); }
        .color-ai .sector-tag { border: 1px solid var(--neon-green); color: var(--neon-green); }

        .color-info { color: var(--neon-yellow); border-left-color: var(--neon-yellow); }
        .color-info .volume-bar { background: var(--neon-yellow); color: var(--neon-yellow); }
        .color-info .sector-tag { border: 1px solid var(--neon-yellow); color: var(--neon-yellow); }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 50px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        @media (max-width: 768px) {
            .data-card {
                grid-template-columns: 40px 1fr;
                gap: 10px;
            }
            .traffic-data {
                grid-column: 2;
                text-align: left;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <canvas id="cyber-canvas"></canvas>
    <div class="scanlines"></div>

    <div class="dashboard-container">
        <header>
            <h1>WHITE ENTERPRISES INC.</h1>
            <div class="subtitle">GLOBAL TRAFFIC OVERVIEW // YEAR 2099 DATABANK</div>
        </header>

        <div class="data-grid" id="data-grid">
            </div>

        <footer>
            DATA SOURCED FROM GLOBAL TELEMETRY SYSTEMS | EDUCATIONAL PROTOTYPE ONLY | ARCHITECT: JIN WHITE
        </footer>
    </div>

    <script>
        // Global Traffic Data
        const globalData = [
            { rank: '01', name: 'Google', traffic: 110, volumeText: '110 Billion', sector: 'Search Engine', colorClass: 'color-search' },
            { rank: '02', name: 'YouTube', traffic: 54, volumeText: '54 Billion', sector: 'Streaming Video', colorClass: 'color-video' },
            { rank: '03', name: 'Facebook', traffic: 10.8, volumeText: '10.8 Billion', sector: 'Social Core', colorClass: 'color-social' },
            { rank: '04', name: 'Instagram', traffic: 7.1, volumeText: '7.1 Billion', sector: 'Visual Social', colorClass: 'color-social' },
            { rank: '05', name: 'ChatGPT', traffic: 6.1, volumeText: '6.1 Billion', sector: 'AI / Neural Net', colorClass: 'color-ai' },
            { rank: '06', name: 'Reddit', traffic: 5.7, volumeText: '5.7 Billion', sector: 'Forum Aggregator', colorClass: 'color-info' },
            { rank: '07', name: 'Wikipedia', traffic: 4.8, volumeText: '4.8 Billion', sector: 'Global Encyclopedia', colorClass: 'color-info' },
            { rank: '08', name: 'X', traffic: 4.4, volumeText: '4.4 Billion', sector: 'Micro-Social', colorClass: 'color-social' },
            { rank: '09', name: 'Amazon', traffic: 4.0, volumeText: '4.0 Billion', sector: 'E-Commerce', colorClass: 'color-search' },
            { rank: '10', name: 'WhatsApp', traffic: 3.0, volumeText: '3.0 Billion', sector: 'Secure Messaging', colorClass: 'color-green' } // Re-using AI color for variation
        ];

        const gridContainer = document.getElementById('data-grid');

        // Render Data Cards
        globalData.forEach((site, index) => {
            // Because Google is so massive (110B), a strict linear scale makes WhatsApp (3B) invisible.
            // We use a modified calculation to ensure all bars are visible but still show scale.
            const minWidth = 10; 
            const calculatedWidth = Math.max(minWidth, (site.traffic / 110) * 100);

            const card = document.createElement('div');
            card.className = `data-card ${site.colorClass}`;
            card.innerHTML = `
                <div class="rank">${site.rank}</div>
                <div class="site-info">
                    <h2>${site.name}</h2>
                    <div class="sector-tag">SYS.${site.sector}</div>
                </div>
                <div class="traffic-data">VOL: ${site.volumeText}</div>
                <div class="traffic-data">STATUS: ONLINE</div>
                <div class="volume-container">
                    <div class="volume-bar" style="width: 0%" data-target-width="${calculatedWidth}%"></div>
                </div>
            `;
            gridContainer.appendChild(card);
        });

        // Animate Volume Bars on Load
        setTimeout(() => {
            document.querySelectorAll('.volume-bar').forEach(bar => {
                bar.style.width = bar.getAttribute('data-target-width');
            });
        }, 500);

        // --- 3D Moving Grid Background ---
        const canvas = document.getElementById('cyber-canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let gridOffset = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        function drawGrid() {
            ctx.fillStyle = '#030508';
            ctx.fillRect(0, 0, width, height);

            ctx.strokeStyle = 'rgba(0, 243, 255, 0.15)';
            ctx.lineWidth = 1;

            const horizon = height * 0.3; // High horizon line
            const fov = 300;

            ctx.beginPath();

            // Draw vertical lines (perspective)
            for (let i = -width; i < width * 2; i += 80) {
                ctx.moveTo(width / 2, horizon);
                ctx.lineTo(i, height);
            }

            // Draw horizontal lines (moving forward)
            gridOffset = (gridOffset + 1) % 40;
            for (let i = gridOffset; i < height - horizon; i += 40) {
                // Closer lines are spaced further apart to fake 3D depth
                let y = horizon + Math.pow(i, 1.4) * 0.2; 
                if (y > height) break;
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
            }

            ctx.stroke();
            requestAnimationFrame(drawGrid);
        }

        drawGrid();
    </script>
</body>
</html>
