<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog Selection Directory</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19; /* Deep infrastructure dark mode */
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            font-weight: 300;
            letter-spacing: 3px;
            margin-bottom: 40px;
            color: #38bdf8; /* Cyber blue accent */
            text-transform: uppercase;
        }
        .container {
            display: flex;
            gap: 25px;
            max-width: 900px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            flex-wrap: wrap; /* Adjusts for mobile screens */
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 40px 30px;
            flex: 1;
            min-width: 250px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .card:hover {
            border-color: #38bdf8;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.15);
            transform: translateY(-5px);
        }
        .card h2 {
            margin-top: 0;
            font-size: 1.4rem;
            color: #f8fafc;
            letter-spacing: 1px;
        }
        .card p {
            font-size: 0.95rem;
            color: #94a3b8;
            margin-bottom: 0;
            line-height: 1.5;
        }
        .icon {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <h1>OmniSense Directory</h1>

    <div class="container">
        <a href="IT_Business_Research_Catalog.html" class="card">
            <div class="icon">📊</div>
            <h2>IT Business Research</h2>
            <p>Access high-level strategic analysis and unit economics data.</p>
        </a>

        <a href="IT_Infra_Business_Catalog.html" class="card">
            <div class="icon">⚙️</div>
            <h2>IT Infrastructure</h2>
            <p>Access architecture blueprints and deployment protocols.</p>
        </a>
    </div>

</body>
</html>
