<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMNIVEX // QUANTUM CLIENT SELECTION & DECISION TOOL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --void: #030508;
  --deep: #060b12;
  --surface: #090f1c;
  --panel: #0d1525;
  --border: #1a2d50;
  --border-hi: #0d4a8a;
  --cyan: #00d4ff;
  --cyan-dim: #0088bb;
  --gold: #f0a500;
  --gold-dim: #a87000;
  --green: #00ff88;
  --green-dim: #008844;
  --purple: #b060ff;
  --purple-dim: #6030aa;
  --red: #ff4060;
  --amber: #ffaa00;
  --text-pri: #c8dff5;
  --text-sec: #6a8ab0;
  --text-dim: #3a5070;
  --ibm: #6699ff;
  --goog: #66cc88;
  --qinn: #c080ff;
  --rig: #ffc040;
  --ionq: #00d4ff;
}
*{box-sizing:border-box;margin:0;padding:0;scroll-behavior:smooth}
body{background:var(--void);color:var(--text-pri);font-family:'Rajdhani',sans-serif;font-size:15px;line-height:1.6;overflow-x:hidden;min-height:100vh}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,15,35,0.1) 3px,rgba(0,15,35,0.1) 4px);pointer-events:none;z-index:0}

/* NAV */
nav{position:sticky;top:0;z-index:200;background:rgba(3,5,8,0.97);border-bottom:1px solid var(--border);padding:12px 32px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(10px)}
.nav-logo{font-family:'Orbitron',sans-serif;font-size:12px;color:var(--cyan);letter-spacing:3px;font-weight:900}
.nav-badge{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--gold);border:1px solid var(--gold-dim);padding:3px 10px;border-radius:2px;letter-spacing:2px}

/* TABS */
.tabs{display:flex;background:var(--deep);border-bottom:1px solid var(--border);position:sticky;top:51px;z-index:190}
.tab-btn{flex:1;padding:16px 24px;font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;font-weight:700;background:transparent;border:none;color:var(--text-dim);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;position:relative}
.tab-btn:hover{color:var(--text-sec);background:rgba(0,212,255,0.03)}
.tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan);background:rgba(0,212,255,0.05)}
.tab-panel{display:none;position:relative;z-index:1}
.tab-panel.active{display:block}

/* SELECTION TOOL */
.sel-layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 103px)}
.sel-sidebar{background:var(--deep);border-right:1px solid var(--border);padding:0;overflow-y:auto;max-height:calc(100vh - 103px);position:sticky;top:103px}
.sb-section{border-bottom:1px solid var(--border)}
.sb-head{padding:14px 20px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--cyan);letter-spacing:3px;background:rgba(0,212,255,0.04);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.sb-head span{font-size:9px;color:var(--text-dim)}
.sb-body{padding:12px 16px;display:flex;flex-direction:column;gap:8px}

/* FILTER ROW */
.filter-row{padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.filter-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:2px}
.filter-chip{font-family:'Share Tech Mono',monospace;font-size:10px;padding:4px 10px;border:1px solid var(--border);border-radius:2px;background:transparent;color:var(--text-sec);cursor:pointer;transition:all 0.15s;letter-spacing:1px}
.filter-chip:hover{border-color:var(--cyan-dim);color:var(--cyan)}
.filter-chip.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,0.08)}

/* CHECKBOX ITEM */
.chk-item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:4px;cursor:pointer;transition:background 0.15s}
.chk-item:hover{background:rgba(0,212,255,0.04)}
.chk-item input[type=checkbox]{accent-color:var(--cyan);width:14px;height:14px;margin-top:3px;flex-shrink:0;cursor:pointer}
.chk-label{flex:1}
.chk-name{font-size:13px;color:var(--text-pri);font-weight:600;line-height:1.3}
.chk-meta{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:1px;margin-top:2px}
.chk-price{font-family:'Orbitron',monospace;font-size:10px;color:var(--gold);margin-top:2px}
.vendor-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle;flex-shrink:0;margin-top:5px}

/* MAIN CONTENT */
.sel-main{padding:24px;display:flex;flex-direction:column;gap:20px;overflow-y:auto;max-height:calc(100vh - 103px)}

/* SECTION HEADER */
.cat-head{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;color:var(--text-dim);padding:0 0 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cat-count{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--cyan)}

/* ITEM CARDS IN MAIN */
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.item-card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:14px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden}
.item-card:hover{border-color:var(--cyan-dim);transform:translateY(-1px)}
.item-card.selected{border-color:var(--cyan);background:rgba(0,212,255,0.06)}
.item-card.selected::after{content:'✓';position:absolute;top:8px;right:10px;color:var(--cyan);font-size:14px;font-weight:bold}
.item-card.hidden{display:none}
.ic-vendor{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;margin-bottom:6px}
.ic-name{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:#e0f0ff;letter-spacing:1px;margin-bottom:6px;padding-right:20px;line-height:1.3}
.ic-desc{font-size:12px;color:var(--text-sec);line-height:1.4;margin-bottom:8px}
.ic-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.ic-tag{font-family:'Share Tech Mono',monospace;font-size:9px;padding:2px 6px;border-radius:2px;letter-spacing:1px}
.ic-price{font-family:'Orbitron',monospace;font-size:11px;color:var(--gold);font-weight:700}

/* CART */
.cart-panel{background:var(--deep);border:1px solid var(--border);border-radius:6px;padding:16px}
.cart-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cart-title{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;color:var(--cyan)}
.cart-actions{display:flex;gap:8px}
.btn{font-family:'Share Tech Mono',monospace;font-size:10px;padding:6px 14px;border:1px solid;border-radius:2px;cursor:pointer;letter-spacing:1px;transition:all 0.15s}
.btn-clear{border-color:var(--border);color:var(--text-dim);background:transparent}
.btn-clear:hover{border-color:var(--red);color:var(--red)}
.btn-export{border-color:var(--gold-dim);color:var(--gold);background:rgba(240,165,0,0.08)}
.btn-export:hover{background:rgba(240,165,0,0.15)}
.cart-empty{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-dim);text-align:center;padding:20px;letter-spacing:2px}
.cart-items{display:flex;flex-direction:column;gap:6px}
.cart-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:4px;gap:8px}
.ci-info{flex:1}
.ci-name{font-size:13px;font-weight:600;color:var(--text-pri)}
.ci-meta{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:1px}
.ci-remove{font-size:16px;color:var(--text-dim);cursor:pointer;padding:0 4px;line-height:1}
.ci-remove:hover{color:var(--red)}
.cart-summary{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;gap:16px;flex-wrap:wrap}
.cs-stat{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-sec);letter-spacing:1px}
.cs-val{color:var(--cyan);font-weight:700}

/* EXPORT MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--border-hi);border-radius:8px;width:90%;max-width:700px;max-height:85vh;overflow-y:auto}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Orbitron',sans-serif;font-size:14px;letter-spacing:2px;color:var(--cyan)}
.modal-close{font-size:20px;color:var(--text-dim);cursor:pointer;padding:0 4px}
.modal-close:hover{color:var(--red)}
.modal-body{padding:24px}
.export-section{margin-bottom:20px}
.ex-head{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--cyan);letter-spacing:3px;margin-bottom:10px}
.export-table{width:100%;border-collapse:collapse}
.export-table th{background:var(--surface);font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);padding:8px 12px;text-align:left;border:1px solid var(--border);letter-spacing:1px}
.export-table td{padding:8px 12px;border:1px solid var(--border);font-size:13px;color:var(--text-sec);vertical-align:top}
.export-table td strong{color:var(--text-pri)}

/* ========== WIZARD ========== */
.wizard-layout{padding:32px;max-width:900px;margin:0 auto}
.wiz-progress{display:flex;align-items:center;margin-bottom:32px;gap:0}
.wiz-step{display:flex;align-items:center;flex:1}
.wiz-dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:11px;color:var(--text-dim);flex-shrink:0;transition:all 0.3s;cursor:pointer}
.wiz-dot.active{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 12px rgba(0,212,255,0.3)}
.wiz-dot.done{border-color:var(--green-dim);background:rgba(0,255,136,0.1);color:var(--green)}
.wiz-line{flex:1;height:1px;background:var(--border);transition:background 0.3s}
.wiz-line.done{background:var(--green-dim)}
.wiz-step-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:1px;text-align:center;margin-top:6px;white-space:nowrap}

.wiz-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:28px}
.wiz-question{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;letter-spacing:1px;color:#e0f0ff;margin-bottom:8px}
.wiz-hint{font-size:13px;color:var(--text-sec);margin-bottom:24px}
.wiz-options{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.wiz-opt{padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all 0.15s;text-align:center}
.wiz-opt:hover{border-color:var(--cyan-dim);background:rgba(0,212,255,0.04)}
.wiz-opt.selected{border-color:var(--cyan);background:rgba(0,212,255,0.1)}
.wiz-opt-icon{font-size:20px;margin-bottom:6px}
.wiz-opt-label{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:#e0f0ff;letter-spacing:1px}
.wiz-opt-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);margin-top:4px;letter-spacing:1px}

.wiz-nav{display:flex;align-items:center;justify-content:space-between;margin-top:24px}
.wiz-btn{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;padding:10px 24px;border-radius:4px;cursor:pointer;transition:all 0.15s;border:1px solid}
.wiz-btn-prev{border-color:var(--border);color:var(--text-sec);background:transparent}
.wiz-btn-prev:hover{border-color:var(--text-sec);color:var(--text-pri)}
.wiz-btn-next{border-color:var(--cyan-dim);color:var(--cyan);background:rgba(0,212,255,0.08)}
.wiz-btn-next:hover{background:rgba(0,212,255,0.16);border-color:var(--cyan)}
.wiz-btn-next:disabled{opacity:0.3;cursor:not-allowed}
.wiz-btn-run{border-color:var(--gold-dim);color:var(--gold);background:rgba(240,165,0,0.1);font-size:11px;padding:12px 32px}
.wiz-btn-run:hover{background:rgba(240,165,0,0.2)}

/* RESULTS */
.results-section{margin-top:28px}
.res-head{font-family:'Orbitron',sans-serif;font-size:14px;letter-spacing:2px;color:var(--cyan);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.results-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.res-col-head{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--text-dim);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.rec-card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:10px;transition:border-color 0.2s}
.rec-card:hover{border-color:var(--cyan-dim)}
.rec-rank{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:2px;margin-bottom:6px}
.rec-name{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:#e0f0ff;letter-spacing:1px;margin-bottom:6px;line-height:1.3}
.rec-vendor{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;margin-bottom:8px}
.rec-bar-wrap{background:var(--surface);border-radius:2px;height:6px;margin-bottom:6px;overflow:hidden}
.rec-bar{height:100%;border-radius:2px;transition:width 0.8s ease}
.rec-score{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;color:var(--cyan)}
.rec-match{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:1px}
.rec-reasons{margin-top:8px;font-size:11px;color:var(--text-sec);line-height:1.5}
.rec-reasons li{list-style:none;padding-left:12px;position:relative}
.rec-reasons li::before{content:'▸';position:absolute;left:0;color:var(--cyan-dim);font-size:9px;top:2px}

.wiz-reset{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);border:1px solid var(--border);background:transparent;padding:6px 16px;border-radius:2px;cursor:pointer;letter-spacing:1px;margin-top:20px}
.wiz-reset:hover{border-color:var(--red);color:var(--red)}

/* TAG COLORS */
.t-ibm{color:var(--ibm);border-color:rgba(102,153,255,0.3);background:rgba(102,153,255,0.08)}
.t-goog{color:var(--goog);border-color:rgba(102,204,136,0.3);background:rgba(102,204,136,0.08)}
.t-qinn{color:var(--qinn);border-color:rgba(192,128,255,0.3);background:rgba(192,128,255,0.08)}
.t-rig{color:var(--rig);border-color:rgba(255,192,64,0.3);background:rgba(255,192,64,0.08)}
.t-ionq{color:var(--ionq);border-color:rgba(0,212,255,0.3);background:rgba(0,212,255,0.08)}
.t-cyan{color:var(--cyan);border-color:rgba(0,212,255,0.3);background:rgba(0,212,255,0.08)}
.t-gold{color:var(--gold);border-color:rgba(240,165,0,0.3);background:rgba(240,165,0,0.08)}
.t-green{color:var(--green);border-color:rgba(0,255,136,0.3);background:rgba(0,255,136,0.08)}
.t-purple{color:var(--purple);border-color:rgba(176,96,255,0.3);background:rgba(176,96,255,0.08)}
.t-red{color:var(--red);border-color:rgba(255,64,96,0.3);background:rgba(255,64,96,0.08)}
.t-amber{color:var(--amber);border-color:rgba(255,170,0,0.3);background:rgba(255,170,0,0.08)}

@media(max-width:900px){
  .sel-layout{grid-template-columns:1fr}
  .sel-sidebar{position:static;max-height:none}
  .results-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">OMNIVEX // QUANTUM CLIENT TOOLS</div>
  <div class="nav-badge">APRIL 2026</div>
</nav>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('selection')">// 01 · CLIENT SELECTION TOOL</button>
  <button class="tab-btn" onclick="switchTab('wizard')">// 02 · DECISION WIZARD</button>
</div>

<!-- ========== TAB 1: SELECTION TOOL ========== -->
<div class="tab-panel active" id="tab-selection">
<div class="sel-layout">

  <!-- SIDEBAR -->
  <div class="sel-sidebar">

    <div class="sb-section">
      <div class="sb-head" onclick="toggleSb(this)">
        VENDORS <span>▾</span>
      </div>
      <div class="sb-body" id="sb-vendors">
        <label class="chk-item"><input type="checkbox" data-group="vendor" data-val="ibm" onchange="applyFilters()"><span class="vendor-dot" style="background:var(--ibm)"></span><div class="chk-label"><div class="chk-name">IBM Quantum</div><div class="chk-meta">SUPERCONDUCTING · QISKIT</div></div></label>
        <label class="chk-item"><input type="checkbox" data-group="vendor" data-val="google" onchange="applyFilters()"><span class="vendor-dot" style="background:var(--goog)"></span><div class="chk-label"><div class="chk-name">Google Quantum AI</div><div class="chk-meta">SUPERCONDUCTING · CIRQ</div></div></label>
        <label class="chk-item"><input type="checkbox" data-group="vendor" data-val="quantinuum" onchange="applyFilters()"><span class="vendor-dot" style="background:var(--qinn)"></span><div class="chk-label"><div class="chk-name">Quantinuum</div><div class="chk-meta">TRAPPED-ION · HELIOS</div></div></label>
        <label class="chk-item"><input type="checkbox" data-group="vendor" data-val="rigetti" onchange="applyFilters()"><span class="vendor-dot" style="background:var(--rig)"></span><div class="chk-label"><div class="chk-name">Rigetti Computing</div><div class="chk-meta">SUPERCONDUCTING · NOVERA</div></div></label>
        <label class="chk-item"><input type="checkbox" data-group="vendor" data-val="ionq" onchange="applyFilters()"><span class="vendor-dot" style="background:var(--ionq)"></span><div class="chk-label"><div class="chk-name">IonQ</div><div class="chk-meta">TRAPPED-ION · $130M REV</div></div></label>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-head" onclick="toggleSb(this)">
        CATEGORY <span>▾</span>
      </div>
      <div class="sb-body" id="sb-cat">
        <label class="chk-item"><input type="checkbox" data-group="cat" data-val="hardware" onchange="applyFilters()"><div class="chk-label"><div class="chk-name">Hardware / QPU</div></div></label>
        <label class="chk-item"><input type="checkbox" data-group="cat" data-val="cloud" onchange="applyFilters()"><div class="chk-label"><div class="chk-name">Cloud Access</div></div></label>
        <label class="chk-item"><input type="checkbox" data-group="cat" data-val="software" onchange="applyFilters()"><div class="chk-label"><div class="chk-name">Software / SDK</div></div></label>
        <label class="chk-item"><input type="checkbox" data-group="cat" data-val="security" onchange="applyFilters()"><div class="chk-label"><div class="chk-name">Security / PQC</div></div></label>
        <label class="chk-item"><input type="checkbox" data-group="cat" data-val="advisory" onchange="applyFilters()"><div class="chk-label"><div class="chk-name">Advisory Services</div></div></label>
        <label class="chk-item"><input type="checkbox" data-group="cat" data-val="technical" onchange="applyFilters()"><div class="chk-label"><div class="chk-name">Technical Delivery</div></div></label>
        <label class="chk-item"><input type="checkbox" data-group="cat" data-val="managed" onchange="applyFilters()"><div class="chk-label"><div class="chk-name">Managed / Retainer</div></div></label>
        <label class="chk-item"><input type="checkbox" data-group="cat" data-val="free" onchange="applyFilters()"><div class="chk-label"><div class="chk-name">Free / Door-Opener</div></div></label>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-head" onclick="toggleSb(this)">
        BUDGET <span>▾</span>
      </div>
      <div class="sb-body" id="sb-budget">
        <label class="chk-item"><input type="checkbox" data-group="budget" data-val="free" onchange="applyFilters()"><div class="chk-label"><div class="chk-name">Free / Zero Cost</div></div></label>
        <label class="chk-item"><input type="checkbox" data-group="budget" data-val="low" onchange="applyFilters()"><div class="chk-label"><div class="chk-name">Under ₹5L / &lt;$50K</div></div></label>

function getVendorColor(vendor) { return VENDORS[vendor]?.color || '#aaa'; }

function getVendorCls(vendor) { return VENDORS[vendor]?.cls || ''; }

function renderItem(item) {
  const selected = cart.has(item.id);

  const vcls = getVendorCls(item.vendor);

  const priceHtml = item.price ? `<div class="ic-price">${item.price}</div>` : '';
  const durationHtml = item.duration ? `<div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim)">${item.duration}</div>` : '';

    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px">${priceHtml}${durationHtml}</div>
  </div>`;
}

function renderAll() {
  const vf = activeFilters.vendor;
  const cf = activeFilters.cat;
  const bf = activeFilters.budget;
  const tf = activeFilters.type;

  function passes(item) {
    if (vf.size > 0 && !vf.has(item.vendor)) return false;
    if (tf.size > 0 && !tf.has(item.type)) return false;
    if (bf.size > 0) {
      if (!bf.has(item.budget)) return false;
    }
    if (cf.size > 0) {
      const matches = cf.has(item.cat) ||
        (item.type === 'dooropener' && cf.has('free')) ||
        (item.type === 'product' && (cf.has('hardware') && item.cat === 'hardware' || cf.has('cloud') && item.cat === 'cloud' || cf.has('software') && item.cat === 'software' || cf.has('security') && item.cat === 'security')) ||
        (item.type === 'service' && (cf.has('advisory') && item.cat === 'advisory' || cf.has('technical') && item.cat === 'technical' || cf.has('managed') && item.cat === 'managed' || cf.has('security') && item.cat === 'security'));
      if (!matches) return false;
    }
    return true;
  }

  const prods = PRODUCTS.filter(passes);
  const svcs = SERVICES.filter(passes);
  const doors = DOOR_OPENERS.filter(passes);

  document.getElementById('grid-products').innerHTML = prods.map(renderItem).join('') || '<div style="color:var(--text-dim);font-family:Share Tech Mono,monospace;font-size:11px;padding:20px;letter-spacing:2px">NO PRODUCTS MATCH CURRENT FILTERS</div>';

  document.getElementById('svc-count').textContent = svcs.length + ' SERVICES';
  document.getElementById('door-count').textContent = doors.length + ' STRATEGIES';
}

function applyFilters() {
  document.querySelectorAll('input[data-group]').forEach(chk => {
    const g = chk.dataset.group;
    const v = chk.dataset.val;
    if (chk.checked) activeFilters[g].add(v);
    else activeFilters[g].delete(v);
  });
  renderAll();
}

function clearAllFilters() {
  document.querySelectorAll('input[data-group]').forEach(chk => chk.checked = false);
  Object.keys(activeFilters).forEach(k => activeFilters[k].clear());
  renderAll();
}

function toggleSb(el) {
  const body = el.nextElementSibling;
  const arrow = el.querySelector('span');
  if (body.style.display === 'none') { body.style.display = 'flex'; arrow.textContent = '▾'; }
  else { body.style.display = 'none'; arrow.textContent = '▸'; }
}

function toggleItem(id) {
  if (cart.has(id)) cart.delete(id);
  else cart.add(id);
  updateCardVisual(id);
  renderCart();
}

function updateCardVisual(id) {
  const el = document.getElementById('card-' + id);
  if (!el) return;
  if (cart.has(id)) el.classList.add('selected');
  else el.classList.remove('selected');

let wizAnswers = {};
let wizStep = 0;

function buildProgress() {
  const prog = document.getElementById('wiz-progress');
  const lbls = document.getElementById('wiz-labels');
  const stepNames = ['Industry', 'Challenge', 'Regulation', 'Infrastructure', 'Budget'];
  let ph = '', lh = '';
  WIZ_STEPS.forEach((s, i) => {
    const isDone = i < wizStep;
    const isActive = i === wizStep;
    ph += `<div style="display:flex;align-items:center;flex:1">
      <div class="wiz-dot ${isDone ? 'done' : isActive ? 'active' : ''}" onclick="if(${isDone})goToStep(${i})">${isDone ? '✓' : i+1}</div>
      ${i < WIZ_STEPS.length - 1 ? `<div class="wiz-line ${isDone ? 'done' : ''}" style="flex:1;height:1px;background:${isDone ? 'var(--green-dim)' : 'var(--border)'}"></div>` : ''}
    </div>`;
    lh += `<div style="flex:1;text-align:center;font-family:Share Tech Mono,monospace;font-size:9px;color:${isActive ? 'var(--cyan)' : isDone ? 'var(--green-dim)' : 'var(--text-dim)'};letter-spacing:1px;margin-top:4px">${stepNames[i].toUpperCase()}</div>`;
  });
  prog.innerHTML = ph;
  lbls.innerHTML = lh;
}

function goToStep(n) {
  wizStep = n;
  buildProgress();
  renderWizStep();
}

function renderWizStep() {
  document.getElementById('wiz-results').style.display = 'none';
  document.getElementById('wiz-card').style.display = 'block';
  const step = WIZ_STEPS[wizStep];
  document.getElementById('wiz-q').textContent = step.q;
  document.getElementById('wiz-hint').textContent = step.hint;
  document.getElementById('wiz-step-counter').textContent = `STEP ${wizStep + 1} OF ${WIZ_STEPS.length}`;

  const sel = wizAnswers[step.id];
  document.getElementById('wiz-opts').innerHTML = step.opts.map(o => `
    <div class="wiz-opt ${sel === o.val ? 'selected' : ''}" onclick="selectOpt('${step.id}','${o.val}',this)">
      <div class="wiz-opt-icon">${o.icon}</div>
      <div class="wiz-opt-label">${o.label}</div>
      <div class="wiz-opt-sub">${o.sub}</div>
    </div>`).join('');

  const prev = document.getElementById('wiz-prev');
  const next = document.getElementById('wiz-next');
  prev.style.visibility = wizStep === 0 ? 'hidden' : 'visible';

  const isLast = wizStep === WIZ_STEPS.length - 1;
  next.textContent = isLast ? 'GET RECOMMENDATIONS ▶' : 'NEXT →';
  next.className = 'wiz-btn ' + (isLast ? 'wiz-btn-run' : 'wiz-btn-next');
  next.disabled = !sel;
}

function selectOpt(stepId, val, el) {
  wizAnswers[stepId] = val;
  el.closest('.wiz-options').querySelectorAll('.wiz-opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('wiz-next').disabled = false;
}

function wizPrev() {
  if (wizStep > 0) { wizStep--; buildProgress(); renderWizStep(); }
}

function wizNext() {
  const step = WIZ_STEPS[wizStep];
  if (!wizAnswers[step.id]) return;
  if (wizStep < WIZ_STEPS.length - 1) {
    wizStep++;
    buildProgress();
    renderWizStep();
  } else {
    runScoring();
  }
}

function runScoring() {
  const { industry, challenge, regulation, infra, budget } = wizAnswers;

  function scoreVendor(vendor) {
    let s = 0;
    // Industry fit
    if (vendor === 'ibm') {
      if (['bfsi','enterprise','gcc'].includes(industry)) s += 25;
      else if (['fintech','manufacturing'].includes(industry)) s += 15;
    }
    if (vendor === 'quantinuum') {
      if (['bfsi','hft','government'].includes(industry)) s += 28;
      else if (['healthcare','fintech'].includes(industry)) s += 18;
    }
    if (vendor === 'ionq') {
      if (['bfsi','government','gcc'].includes(industry)) s += 26;
      else if (['hft','fintech'].includes(industry)) s += 18;
    }
    if (vendor === 'google') {
      if (['gcc','hft','healthcare'].includes(industry)) s += 22;
      else if (['enterprise','fintech'].includes(industry)) s += 12;
    }
    if (vendor === 'rigetti') {
      if (['government','gcc'].includes(industry)) s += 20;
      else if (['manufacturing','enterprise'].includes(industry)) s += 12;
    }
    // Challenge fit
    if (challenge === 'security' && ['quantinuum','ionq'].includes(vendor)) s += 30;
    if (challenge === 'fraud' && ['ibm','ionq'].includes(vendor)) s += 22;
    if (challenge === 'compliance' && ['ibm','quantinuum'].includes(vendor)) s += 22;
    if (challenge === 'cost' && ['ibm','google'].includes(vendor)) s += 18;
    if (challenge === 'ai' && ['ibm','ionq'].includes(vendor)) s += 20;
    if (challenge === 'analytics' && ['ibm','google','ionq'].includes(vendor)) s += 18;
    if (challenge === 'competitive' && ['quantinuum','ionq'].includes(vendor)) s += 15;
    if (challenge === 'automation' && 'ibm' === vendor) s += 18;
    // Regulation
    if (['rbi','sebi'].includes(regulation) && ['ibm','quantinuum','ionq'].includes(vendor)) s += 15;
    if (regulation === 'hipaa' && ['ibm','quantinuum'].includes(vendor)) s += 15;
    if (regulation === 'gdpr' && ['ibm','ionq'].includes(vendor)) s += 12;
    if (regulation === 'pci' && ['quantinuum','ionq'].includes(vendor)) s += 18;
    if (['mas','dfsa'].includes(regulation) && ['ibm','ionq'].includes(vendor)) s += 14;
    // Infra fit
    if (infra === 'cloud' && ['ibm','ionq','google'].includes(vendor)) s += 20;
    if (infra === 'onprem' && ['quantinuum','rigetti'].includes(vendor)) s += 25;
    if (infra === 'hybrid' && ['ibm','ionq'].includes(vendor)) s += 20;
    if (infra === 'edge' && ['rigetti','ionq'].includes(vendor)) s += 22;
    if (infra === 'legacy' && 'ibm' === vendor) s += 20;
    // Budget
    if (budget === 'free' && 'ibm' === vendor) s += 20;
    if (budget === 'free' && 'google' === vendor) s += 18;
    if (budget === 'low' && ['ibm','ionq','rigetti'].includes(vendor)) s += 12;
    if (['mid','high','enterprise'].includes(budget) && ['quantinuum','ibm','ionq'].includes(vendor)) s += 15;
    return Math.min(s, 100);
  }

  function scoreItem(item) {
    let s = 0;
    const vendorScore = item.vendor === 'multi' ? 60 : scoreVendor(item.vendor);
    s += vendorScore * 0.4;

    // Budget match
    const bmap = { free: 0, low: 1, mid: 2, high: 3, enterprise: 4 };
    const clientBudget = bmap[budget] || 0;
    const itemBudget = bmap[item.budget] || 0;
    if (itemBudget === clientBudget) s += 30;
    else if (itemBudget === clientBudget - 1) s += 15;
    else if (itemBudget > clientBudget) s -= 20;

    // Challenge alignment
    if (challenge === 'security' && ['security','pqc','qrng'].some(t => item.tags?.includes(t))) s += 25;
    if (challenge === 'fraud' && item.tags?.includes('poc')) s += 15;
    if (challenge === 'compliance' && item.tags?.includes('advisory')) s += 20;
    if (challenge === 'competitive' && item.cat === 'advisory') s += 15;
    if (challenge === 'ai' && item.tags?.some(t => ['poc','development','algorithm'].includes(t))) s += 18;
    if (challenge === 'analytics' && item.tags?.some(t => ['poc','development'].includes(t))) s += 15;

    // Infra alignment
    if (infra === 'cloud' && item.cat === 'cloud') s += 15;
    if (infra === 'onprem' && item.tags?.includes('onprem')) s += 20;
    if (infra === 'edge' && item.tags?.includes('sovereign')) s += 22;

    // Door-opener bonus if budget is free
    if (budget === 'free' && item.type === 'dooropener') s += 30;

    // Tier A advisory bonus for low budget
    if (['free','low'].includes(budget) && item.cat === 'advisory') s += 10;

    return Math.min(Math.round(s), 100);
  }

  const vendorScores = Object.keys(VENDORS).filter(v => v !== 'multi').map(v => ({ v, score: scoreVendor(v) })).sort((a,b) => b.score - a.score);
  const prodScored = PRODUCTS.map(p => ({ ...p, score: scoreItem(p) })).sort((a,b) => b.score - a.score).slice(0, 5);
  const svcScored = SERVICES.map(s => ({ ...s, score: scoreItem(s) })).sort((a,b) => b.score - a.score).slice(0, 5);
  const doorScored = DOOR_OPENERS.map(d => ({ ...d, score: scoreItem(d) })).sort((a,b) => b.score - a.score).slice(0, 5);

  renderResults(vendorScores, prodScored, svcScored, doorScored);
}

  const color = colors[vendor] || '#00d4ff';
  return `<div class="rec-bar-wrap"><div class="rec-bar" style="width:${score}%;background:${color}"></div></div>`;

    if (challenge === 'security') reasons.push('Quantum Security Platform / PQC');
    if (infra === 'cloud') reasons.push('AWS, Azure, GCP all supported');
    if (industry === 'government') reasons.push('DARPA + KISTI sovereign deployments');
  }
  if (vendor === 'google') {
    reasons.push('Quantum advantage achieved (2025)');
    if (challenge === 'analytics') reasons.push('Cirq + Vertex AI pipeline');
    if (budget === 'free') reasons.push('Cirq SDK is completely free');
  }
  if (vendor === 'rigetti') {
    if (infra === 'onprem' || infra === 'edge') reasons.push('Novera — only purchasable QPU');
    if (industry === 'government') reasons.push('Sovereign/classified deployment');
    reasons.push('Low-cost AWS Braket entry point');
  }
  return reasons.slice(0, 3);
}

function applyWizardToTab() {
  const { vendor, budget } = wizAnswers;
  // Pre-select vendor filter based on top vendor recommendation
  switchTab('selection');
}

function resetWizard() {
  wizAnswers = {};
  wizStep = 0;
  buildProgress();
  renderWizStep();
  document.getElementById('wiz-results').style.display = 'none';
  document.getElementById('wiz-card').style.display = 'block';
}

// ============================================================
// TAB SWITCHING
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'selection') || (i === 1 && tab === 'wizard'));
  });
  document.getElementById('tab-selection').classList.toggle('active', tab === 'selection');
  document.getElementById('tab-wizard').classList.toggle('active', tab === 'wizard');
}

// ============================================================
// INIT
// ============================================================
renderAll();
buildProgress();
renderWizStep();
</script>
</body>
</html>
